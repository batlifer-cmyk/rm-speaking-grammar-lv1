<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RM 스피킹 문법 학습기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');

  :root {
    --navy: #3A4F5C;
    --sage: #BBCBCD;
    --warmgray: #ECEBE6;
    --white: #FFFFFF;
    --correct: #4C8C6B;
    --wrong: #C1584B;
    --text-dim: #7A8A90;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--warmgray);
    color: var(--navy);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
  }
  header.app-header {
    background: var(--navy);
    color: var(--white);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header.app-header .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 2px;
  }
  header.app-header .logo span { color: var(--sage); font-size: 13px; letter-spacing: 1px; margin-left: 8px; font-family: 'Noto Sans KR', sans-serif; font-weight: 300; }
  .progress-bar-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-label { font-size: 11px; color: var(--sage); }
  .progress-bar-track { width: 110px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; }
  .progress-bar-fill { height: 100%; width:0%; background: var(--sage); border-radius: 3px; transition: width .4s ease; }

  .container { max-width: 680px; margin: 0 auto; padding: 20px 16px 60px; }

  /* CHAPTER SELECTOR */
  .chapter-selector h2 { font-size: 1.3rem; margin-bottom: 4px; }
  .chapter-selector .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px; }
  .group-block { margin-bottom: 22px; }
  .group-title {
    font-size: 0.78rem; font-weight: 700; letter-spacing: 1px;
    color: var(--navy); text-transform: uppercase;
    border-left: 4px solid var(--sage); padding-left: 8px; margin-bottom: 10px;
  }
  .chapter-card {
    background: var(--white); border-radius: 10px; padding: 14px 16px;
    margin-bottom: 8px; cursor: pointer; border: 1px solid #DCE0DC;
    display: flex; justify-content: space-between; align-items: center;
    transition: box-shadow .15s ease, transform .15s ease;
  }
  .chapter-card:hover { box-shadow: 0 4px 14px rgba(58,79,92,0.12); transform: translateY(-1px); }
  .chapter-card .cc-name { font-weight: 700; font-size: 0.95rem; }
  .chapter-card .cc-topic { font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }
  .chapter-card .cc-badge {
    background: var(--sage); color: var(--navy); font-size: 0.68rem; font-weight: 700;
    padding: 3px 9px; border-radius: 20px; white-space: nowrap;
  }

  /* QUIZ AREA */
  .quiz-area { display: none; }
  .quiz-area.visible { display: block; }
  .back-btn {
    background: none; border: none; cursor: pointer; color: var(--navy);
    font-size: 0.8rem; margin-bottom: 14px; padding: 0; font-family: inherit;
    display: flex; align-items: center; gap: 4px; opacity: 0.7;
  }
  .back-btn:hover { opacity: 1; }
  .quiz-header { display:flex; align-items:center; gap:8px; margin-bottom: 6px; flex-wrap: wrap; }
  .quiz-topic-tag {
    background: var(--navy); color: var(--white); font-size: 0.7rem; font-weight: 700;
    padding: 3px 10px; border-radius: 20px;
  }
  .quiz-type-badge {
    background: var(--white); border: 1px solid var(--sage); color: var(--navy);
    font-size: 0.7rem; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  }
  .question-counter { font-size: 0.78rem; color: var(--text-dim); margin-bottom: 14px; }

  .structure-hint {
    background: var(--white); border-left: 4px solid var(--sage);
    border-radius: 0 8px 8px 0; padding: 12px 16px; margin-bottom: 18px;
    font-size: 0.8rem; line-height: 1.7;
  }
  .structure-hint .sh-title { font-weight: 700; color: var(--navy); margin-bottom: 6px; }
  .structure-hint .sh-desc { color: #55666D; }

  .q-card {
    background: var(--white); border-radius: 14px; padding: 20px;
    box-shadow: 0 2px 10px rgba(58,79,92,0.08); margin-bottom: 16px;
  }
  .q-instruction { font-weight: 700; font-size: 0.95rem; margin-bottom: 10px; }
  .q-scenario {
    background: var(--warmgray); border-radius: 8px; padding: 8px 12px;
    font-size: 0.82rem; margin-bottom: 12px; color: #55666D;
  }
  .q-scenario .q-label { font-weight:700; color: var(--navy); margin-right:6px; }
  .q-main, .q-blank-sentence { font-size: 1.05rem; font-weight: 500; margin-bottom: 16px; line-height: 1.6; }
  .blank-slot {
    display: inline-block; min-width: 70px; border-bottom: 2px solid var(--navy);
    text-align: center; font-weight: 700; color: var(--navy); padding: 0 4px;
  }

  .options-list { display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    display: flex; align-items: center; gap: 10px; text-align: left;
    background: var(--warmgray); border: 2px solid transparent; border-radius: 10px;
    padding: 11px 14px; font-family: inherit; font-size: 0.88rem; cursor: pointer;
    transition: all .15s ease; color: var(--navy);
  }
  .option-btn:hover:not(:disabled) { border-color: var(--sage); }
  .option-btn .opt-letter {
    background: var(--navy); color: var(--white); font-weight: 700; font-size: 0.72rem;
    width: 22px; height: 22px; border-radius: 50%; display:flex; align-items:center; justify-content:center;
    flex-shrink: 0;
  }
  .option-btn.correct { background: #E4F1E9; border-color: var(--correct); }
  .option-btn.correct .opt-letter { background: var(--correct); }
  .option-btn.wrong { background: #F7E6E3; border-color: var(--wrong); }
  .option-btn.wrong .opt-letter { background: var(--wrong); }
  .option-btn:disabled { cursor: default; }

  /* WORD ORDER */
  .wo-target {
    min-height: 52px; background: var(--warmgray); border: 2px dashed var(--sage);
    border-radius: 10px; padding: 8px; display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 14px; align-items: center;
  }
  .wo-target .wo-placeholder { color: var(--text-dim); font-size: 0.78rem; padding: 4px 6px; }
  .wo-pool { display: flex; flex-wrap: wrap; gap: 8px; }
  .wo-chip {
    background: var(--white); border: 2px solid var(--sage); color: var(--navy);
    font-weight: 600; font-size: 0.85rem; padding: 8px 14px; border-radius: 20px;
    cursor: pointer; font-family: inherit; transition: all .12s ease;
  }
  .wo-chip:hover { background: var(--navy); color: var(--white); }
  .wo-chip.used { opacity: 0.25; pointer-events: none; }
  .wo-chip-placed {
    background: var(--navy); color: var(--white); font-weight: 600; font-size: 0.85rem;
    padding: 8px 14px; border-radius: 20px; cursor: pointer; font-family: inherit; position: relative;
  }
  .wo-labels { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .wo-label-tag { font-size: 0.68rem; color: var(--text-dim); background: var(--warmgray); padding: 2px 8px; border-radius: 10px; }

  .feedback-box { display: none; border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; font-size: 0.85rem; line-height: 1.7; }
  .feedback-box.correct { background: #E4F1E9; border: 1px solid var(--correct); }
  .feedback-box.wrong { background: #F7E6E3; border: 1px solid var(--wrong); }
  .feedback-box .fb-title { font-weight: 700; margin-bottom: 6px; }
  .feedback-box.correct .fb-title { color: var(--correct); }
  .feedback-box.wrong .fb-title { color: var(--wrong); }
  .fb-source { margin-top: 8px; font-size: 0.72rem; color: var(--text-dim); border-top: 1px dashed #CBD3D0; padding-top: 6px; }

  /* CONCEPT CARD */
  .concept-emoji { font-size: 2.2rem; margin-bottom: 8px; }
  .concept-title { font-weight: 700; font-size: 1.12rem; margin-bottom: 12px; color: var(--navy); }
  .concept-body { font-size: 0.92rem; line-height: 1.85; color: #3f4f56; margin-bottom: 16px; }
  .concept-examples { background: var(--warmgray); border-radius: 10px; padding: 12px 14px; }
  .ex-row { display: flex; gap: 10px; padding: 5px 0; font-size: 0.82rem; }
  .ex-label { font-weight: 700; color: var(--navy); min-width: 78px; flex-shrink:0; }
  .ex-text { color: #55666D; }

  .btn-row { display: flex; gap: 10px; justify-content: flex-end; }
  .btn { border: none; border-radius: 24px; padding: 10px 22px; font-family: inherit; font-weight: 700;
    font-size: 0.85rem; cursor: pointer; transition: all .15s ease; }
  .btn-primary { background: var(--navy); color: var(--white); }
  .btn-primary:hover { background: #2C3D48; }
  .btn-secondary { background: var(--white); color: var(--navy); border: 1px solid var(--sage); }
  .btn:disabled { opacity: 0.4; cursor: default; }

  /* SCORE */
  .score-screen { display: none; text-align: center; padding: 40px 10px; }
  .score-screen.visible { display: block; }
  .score-emoji { font-size: 2.6rem; margin-bottom: 6px; }
  .score-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
  .score-num { font-size: 1.8rem; font-weight: 900; color: var(--navy); margin-bottom: 6px; font-family:'Bebas Neue'; letter-spacing:1px;}
  .score-sub { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 18px; }
  .score-breakdown { background: var(--white); border-radius: 10px; padding: 14px 18px; text-align:left; margin-bottom: 18px; }
  .sb-row { display:flex; justify-content: space-between; font-size: 0.82rem; padding: 5px 0; border-bottom: 1px solid var(--warmgray); }
  .sb-row:last-child{ border-bottom:none; }
  .sb-val.good { color: var(--correct); font-weight:700; }
  .sb-val.bad { color: var(--wrong); font-weight:700; }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">RM <span>스피킹 문법</span> 학습기</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 / 0</div>
  </div>
</header>

<div class="container">

  <div class="chapter-selector" id="chapterSelector">
    <h2>어떤 챕터로 훈련할까요?</h2>
    <p class="subtitle">운전면허처럼, 개념(0부)과 이론(1부)을 먼저 이해하고 실기(2부)로 직접 말을 완성해보세요.</p>
    <div id="groupContainer"></div>
  </div>

  <div class="quiz-area" id="quizArea">
    <button class="back-btn" onclick="backToSelector()">← 챕터 선택으로</button>
    <div class="quiz-header">
      <span class="quiz-topic-tag" id="quizTopicTag"></span>
      <span class="quiz-type-badge" id="quizTypeBadge"></span>
    </div>
    <div class="question-counter" id="questionCounter"></div>
    <div class="structure-hint" id="structureHint"></div>
    <div class="q-card" id="qCard"></div>
    <div class="feedback-box" id="feedbackBox"></div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()" style="display:none">← 이전</button>
      <button class="btn btn-secondary" id="checkBtn" onclick="checkAnswer()" style="display:none">확인</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none">다음 문제 →</button>
    </div>
  </div>

  <div class="score-screen" id="scoreScreen">
    <div class="score-emoji" id="scoreEmoji"></div>
    <div class="score-title">훈련 완료!</div>
    <div class="score-num" id="scoreNum"></div>
    <div class="score-sub" id="scoreSub"></div>
    <div class="score-breakdown" id="scoreBreakdown"></div>
    <div class="btn-row" style="justify-content:center; gap:12px;">
      <button class="btn btn-secondary" onclick="retryChapter()">다시 도전</button>
      <button class="btn btn-primary" onclick="backToSelector()">다른 챕터</button>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════
// DATA
// 소스 원칙: 질문은 교재(1~2권) 실제 토픽 질문 그대로, 답변 문장은 해당 질문 맥락에
// 맞춰 새로 구성. 왕초보 대상이므로 동사 단수/복수 일치, 전치사 디테일은 출제 제외.
// 완료형/문장확장/도치는 문법용어 없이 상황·비유로 먼저 개념교육(0부) 후 퀴즈 진행.
// ══════════════════════════════════════════════
const CHAPTERS = [
  {
    "id": "wo_0",
    "group": "① 어순 (Word Order)",
    "num": "1-0",
    "name": "교포처럼 말하기 — 어순 감각 워밍업",
    "topic": "나의 하루 (인칭·시제 대입)",
    "source": "1권 「어순훈련」+「파워하우스 표준패턴1」 원문 응용",
    "structure": {
      "title": "핵심 원리: 한국어 단어를 영어 순서로 배치해보기",
      "desc": "교재의 첫 훈련법이에요. 영어 단어를 몰라도 괜찮습니다. 한국어 단어를 영어의 순서(주어→동사→나머지)대로 배치해서 말해보는 연습이에요. \"나는 / 만났다 / 내 친구를\"처럼요."
    },
    "concept": {
      "emoji": "🗣️",
      "title": "교포처럼 한국어를 \"영어 순서\"로 말해보기",
      "body": "먼저 한국어 단어를 영어의 순서(주어→동사→나머지)대로 배치해서 말하는 연습을 해보세요. \"나는 / 만났다 / 내 친구를\"처럼요. 마치 한국말이 조금 서툰 교포가 어색하게 순서를 지켜 말하는 것 같죠? 그런데 바로 그 \"어색해 보이는 순서 감각\"이, 나중에 진짜 영어를 할 때는 자연스러운 정답이 됩니다.",
      "examples": [
        {
          "label": "한국어 원래 어순",
          "text": "나는 내 친구를 만났다 (목적어가 동사 앞)"
        },
        {
          "label": "교포체(영어 어순)",
          "text": "나는 / 만났다 / 내 친구를 (동사가 목적어 앞)"
        }
      ]
    },
    "questions": [
      {
        "type": "wordorder",
        "part": 1,
        "instruction": "다음 한국어 조각을 '교포처럼' 영어 어순대로 배열하세요: \"나는 / 갔다 / 학교에\"",
        "scenario": "어순 감각 워밍업",
        "words": [
          "학교에",
          "나는",
          "갔다"
        ],
        "answer": [
          1,
          2,
          0
        ],
        "labels": [
          "주어",
          "동사",
          "장소"
        ],
        "feedback": {
          "correct": "완벽해요! 나는(주어=S)→갔다(동사=V)→학교에(장소) 순서예요. 한국어는 한다(동사)가 문장 맨 끝에 숨어있는데, 영어는 한다(동사)가 누가(주어) 바로 뒤로 폴짝 점프해서 두 번째 자리에 앉아요. 이게 SOV(한국어)↔SVO(영어)의 차이예요!",
          "wrong": "정답 순서: 나는 → 갔다 → 학교에. 한국어는 한다(동사)가 맨 끝에 숨어있지만 영어는 한다(동사)가 누가(주어) 바로 뒤로 폴짝 튀어나와요. 이게 '교포체' 말하기의 핵심입니다."
        }
      },
      {
        "type": "wordorder",
        "part": 1,
        "instruction": "다음 한국어 조각을 '교포처럼' 영어 어순대로 배열하세요: \"그는 좋아한다 커피를\"",
        "scenario": "어순 감각 워밍업",
        "words": [
          "커피를",
          "좋아한다",
          "그는"
        ],
        "answer": [
          2,
          1,
          0
        ],
        "labels": [
          "주어",
          "동사",
          "목적어"
        ],
        "feedback": {
          "correct": "완벽해요! 그는(주어=S)→좋아한다(동사=V)→커피를(목적어=O) 순서예요. 영어는 좋아한다(동사)가 무엇을(목적어)보다 먼저 점프합니다.",
          "wrong": "정답 순서: 그는 → 좋아한다 → 커피를. '커피를 좋아한다'처럼 무엇을(목적어)을 한다(동사) 앞에 두면 한국어식이에요. 영어는 한다(동사)가 먼저 점프!"
        }
      },
      {
        "type": "mc",
        "part": 2,
        "instruction": "다음 중 \"그녀는 배웠다\"를 영어 어순으로 만든 것은?",
        "scenario": "파워하우스 인칭×시제 대입 훈련",
        "options": [
          "She learn.",
          "She learns.",
          "She learned.",
          "She will learn."
        ],
        "answer": 2,
        "feedback": {
          "correct": "맞아요! '배웠다'는 과거이므로 learned가 정답이에요. 한국어는 지난 일을 말할 때 했다/었다/갔다처럼 았/었(과거 소리)가 붙죠? 영어는 그게 -ed, 즉 드!/트! 소리예요. 언어마다 소리는 달라도, '이건 지난 일이야'라고 신호를 주는 규칙적인 변형이 있는 거랍니다!",
          "wrong": "정답은 \"She learned.\"예요. '배웠다'는 과거니까 하다(동사)도 과거형이 되어야 해요. 한국어는 았/었(과거 소리)로 과거를 표시하는데, 영어는 그게 -ed(드! 소리)예요."
        }
      },
      {
        "type": "mc",
        "part": 2,
        "instruction": "다음 중 \"그들은 배울 것이다\"를 영어 어순으로 만든 것은?",
        "scenario": "파워하우스 인칭×시제 대입 훈련",
        "options": [
          "They learn.",
          "They learned.",
          "They will learn.",
          "They learning."
        ],
        "answer": 2,
        "feedback": {
          "correct": "정확해요! '배울 것이다'는 미래이므로 will learn이 정답이에요. 윌(will) 뒤엔 하다(동사원형)를 그대로 붙여요. 한국어는 할-거야/갈-거야처럼 ㄹ(미래 소리)가 붙죠? 영어도 윌(will) 소리로 '곧 이럴 거야'라고 미리 티를 내는 거예요!",

        }
      }
    ]
  },
  {
    "id": "wo_1",
    "group": "① 어순 (Word Order)",
    "num": "1-1",
    "name": "기본 어순 S+V+O",
    "topic": "하루 일과 (Yesterday)",
    "source": "1권 「어순훈련」 — Claire 매니저 예시 응용",

          "correct": "맞아요! As a result(그 결과)는 결과 깃발이에요. 원인 다음에 이 깃발을 꽂으면 인과관계가 분명해집니다.",
          "wrong": "정답은 As a result예요. Previously/Earlier는 시점을 나타내고, Also는 추가정보 깃발이라 '결과'와는 기능이 달라요."
        }
      },
      {
        "type": "mc",
        "part": 1,
        "instruction": "지금 하는 이야기보다 더 이전에 있었던 일을 언급하려고 해요(\"이전에, 미리\").",
        "options": [
          "Previously, we talked about the schedule.",
          "Next, we talked about the schedule.",
          "Consequently, we talked about the schedule.",
          "Finally, we talked about the schedule."
        ],
        "answer": 0,
        "feedback": {
          "correct": "정확해요! Previously(이전에, 미리)는 시점 깃발이에요. 지금 이야기의 배경이 되는 더 앞선 일을 소개할 때 씁니다.",
          "wrong": "정답은 Previously예요. 나머지는 순서/결과 깃발이라 '더 이전 시점'을 가리키는 기능과는 달라요."
        }
      }
    ]
  }
];

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let currentChapter = null;
let currentQIdx = 0;
let score = 0;
let answers = [];
let woBuilt = []; // word order: array of indices placed
let hasAnswered = false;

// ══════════════════════════════════════════════
// INIT / SELECTOR
// ══════════════════════════════════════════════
function renderSelector() {
  const groups = {};
  CHAPTERS.forEach(ch => { (groups[ch.group] = groups[ch.group] || []).push(ch); });
  const container = document.getElementById('groupContainer');
  container.innerHTML = Object.keys(groups).map(gName => `
    <div class="group-block">
      <div class="group-title">${gName}</div>
      ${groups[gName].map(ch => `
        <div class="chapter-card" onclick="startChapter('${ch.id}')">
          <div>
            <div class="cc-name">${ch.num}. ${ch.name}</div>
            <div class="cc-topic">주제: ${ch.topic}</div>
          </div>
          <div class="cc-badge">${ch.questions.length}문항</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function startChapter(id) {
  currentChapter = CHAPTERS.find(c => c.id === id);
  currentQIdx = currentChapter.concept ? -1 : 0;
  score = 0; answers = [];
  document.getElementById('chapterSelector').style.display = 'none';
  document.getElementById('scoreScreen').classList.remove('visible');
  document.getElementById('quizArea').classList.add('visible');
  document.getElementById('quizTopicTag').textContent = currentChapter.topic;
  renderStructureHint();
  renderQuestion();
}

function backToSelector() {
  document.getElementById('chapterSelector').style.display = 'block';
  document.getElementById('quizArea').classList.remove('visible');
  document.getElementById('scoreScreen').classList.remove('visible');
}

function retryChapter() { startChapter(currentChapter.id); }

function renderStructureHint() {
  const s = currentChapter.structure;
  document.getElementById('structureHint').innerHTML =
    `<div class="sh-title">📌 ${s.title}</div><div class="sh-desc">${s.desc}</div>`;
}

// ══════════════════════════════════════════════
// RENDER CONCEPT (0부)
// ══════════════════════════════════════════════
function renderConcept() {
  const c = currentChapter.concept;
  document.getElementById('questionCounter').textContent = '개념 이해 먼저!';
  document.getElementById('quizTypeBadge').textContent = '0부 · 개념 이해';
  document.getElementById('feedbackBox').style.display = 'none';
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('prevBtn').style.display = 'none';
  const nb = document.getElementById('nextBtn');
  nb.style.display = 'inline-block';
  nb.textContent = '이해했어요, 퀴즈 시작 →';
  const card = document.getElementById('qCard');
  card.innerHTML = `
    <div class="concept-emoji">${c.emoji || '💡'}</div>
    <div class="concept-title">${c.title}</div>
    <div class="concept-body">${c.body}</div>
    ${c.examples ? `<div class="concept-examples">${c.examples.map(e => `<div class="ex-row"><span class="ex-label">${e.label}</span><span class="ex-text">${e.text}</span></div>`).join('')}</div>` : ''}
  `;
  updateProgress();
}

// ══════════════════════════════════════════════
// RENDER QUESTION
// ══════════════════════════════════════════════
function renderQuestion() {
  if (currentQIdx === -1) { renderConcept(); return; }
  const qs = currentChapter.questions;
  if (currentQIdx >= qs.length) { showScore(); return; }
  const q = qs[currentQIdx];
  const isReview = currentQIdx < answers.length;
  hasAnswered = isReview;
  woBuilt = [];

  document.getElementById('questionCounter').textContent = `문제 ${currentQIdx+1} / ${qs.length}${isReview ? ' (복습 중)' : ''}`;
  document.getElementById('quizTypeBadge').textContent = q.part === 1 ? '1부 이론' : (q.type === 'wordorder' ? '2부 실기 · 순서배치' : '2부 실기 · 빈칸채우기');
  updateProgress();

  document.getElementById('feedbackBox').style.display = 'none';
  document.getElementById('feedbackBox').className = 'feedback-box';
  document.getElementById('checkBtn').style.display = (q.type === 'wordorder' && !isReview) ? 'inline-block' : 'none';
  const nb = document.getElementById('nextBtn');
  nb.textContent = '다음 문제 →';
  nb.style.display = isReview ? 'inline-block' : 'none';
  const floor = currentChapter.concept ? -1 : 0;
  document.getElementById('prevBtn').style.display = currentQIdx > floor ? 'inline-block' : 'none';

  const card = document.getElementById('qCard');

  if (q.type === 'mc' || q.type === 'fillblank') {
    const mainHTML = q.type === 'fillblank'
      ? `<div class="q-blank-sentence">${q.blankSentence.replace('___', '<span class="blank-slot">?</span>')}</div>`
      : '';
    card.innerHTML = `
      <div class="q-instruction">${q.instruction}</div>
      ${q.scenario ? `<div class="q-scenario"><span class="q-label">상황</span>${q.scenario}</div>` : ''}
      ${mainHTML}
      <div class="options-list">
        ${q.options.map((opt,i) => `
          <button class="option-btn" onclick="selectMC(${i})" id="opt_${i}">
            <span class="opt-letter">${String.fromCharCode(65+i)}</span><span>${opt}</span>
          </button>`).join('')}
      </div>`;
    if (isReview) {
      setTimeout(() => {
        document.querySelectorAll('.option-btn').forEach((btn,i) => {
          btn.disabled = true;
          if (i === q.answer) btn.classList.add('correct');
        });
        showFeedback(answers[currentQIdx] ? answers[currentQIdx].correct : false, q);
      }, 0);
    }
  } else if (q.type === 'wordorder') {
    const shuffled = q.words.map((w,i) => ({w, origIdx:i})).sort(() => Math.random()-0.5);
    card.innerHTML = `
      <div class="q-instruction">${q.instruction}</div>
      ${q.scenario ? `<div class="q-scenario"><span class="q-label">상황</span>${q.scenario}</div>` : ''}
      <div class="wo-target" id="woTarget"><span class="wo-placeholder">단어를 눌러 여기에 순서대로 쌓으세요</span></div>
      <div class="wo-pool" id="woPool">
        ${shuffled.map(item => `<button class="wo-chip" data-idx="${item.origIdx}" onclick="pickWord(this, ${item.origIdx})">${item.w}</button>`).join('')}
      </div>
      <div class="wo-labels">${q.labels.map(l => `<span class="wo-label-tag">${l}</span>`).join('')}</div>
    `;
    if (isReview) {
      setTimeout(() => {
        document.querySelectorAll('.wo-chip').forEach(c => c.disabled = true);
        renderWoTargetReview(q);
        document.getElementById('checkBtn').style.display = 'none';
        showFeedback(answers[currentQIdx] ? answers[currentQIdx].correct : false, q);
      }, 0);
    }
  }
}

function renderWoTargetReview(q) {
  const target = document.getElementById('woTarget');
  target.innerHTML = q.answer.map(idx => `<span class="wo-chip-placed">${q.words[idx]}</span>`).join('');
}

// ══════════════════════════════════════════════
// MC / FILLBLANK LOGIC
// ══════════════════════════════════════════════
function selectMC(idx) {
  if (hasAnswered) return;
  hasAnswered = true;
  const q = currentChapter.questions[currentQIdx];
  const correct = idx === q.answer;
  document.querySelectorAll('.option-btn').forEach((btn,i) => {
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  });
  answers[currentQIdx] = {correct};
  if (correct) score++;
  showFeedback(correct, q);
  document.getElementById('nextBtn').style.display = 'inline-block';
}

// ══════════════════════════════════════════════
// WORD ORDER LOGIC
// ══════════════════════════════════════════════
function pickWord(btn, idx) {
  if (hasAnswered) return;
  btn.classList.add('used');
  woBuilt.push(idx);
  renderWoTarget();
}

function renderWoTarget() {
  const q = currentChapter.questions[currentQIdx];
  const target = document.getElementById('woTarget');
  if (woBuilt.length === 0) {
    target.innerHTML = `<span class="wo-placeholder">단어를 눌러 여기에 순서대로 쌓으세요</span>`;
    return;
  }
  target.innerHTML = woBuilt.map((idx, pos) =>
    `<span class="wo-chip-placed" onclick="removeWord(${pos})">${q.words[idx]} ✕</span>`).join('');
}

function removeWord(pos) {
  if (hasAnswered) return;
  const q = currentChapter.questions[currentQIdx];
  const removedIdx = woBuilt[pos];
  woBuilt.splice(pos, 1);
  renderWoTarget();
  const chip = document.querySelector(`.wo-chip[data-idx="${removedIdx}"]`);
  if (chip) chip.classList.remove('used');
}

function checkAnswer() {
  const q = currentChapter.questions[currentQIdx];
  if (q.type !== 'wordorder') return;
  if (woBuilt.length !== q.answer.length) return;
  hasAnswered = true;
  const correct = JSON.stringify(woBuilt) === JSON.stringify(q.answer);
  document.querySelectorAll('.wo-chip').forEach(c => c.disabled = true);
  const target = document.getElementById('woTarget');
  target.querySelectorAll('.wo-chip-placed').forEach((el,i) => {
    el.style.pointerEvents = 'none';
    el.textContent = el.textContent.replace(' ✕','');
    el.style.background = (woBuilt[i] === q.answer[i]) ? 'var(--correct)' : 'var(--wrong)';
  });
  answers[currentQIdx] = {correct};
  if (correct) score++;
  document.getElementById('checkBtn').style.display = 'none';
  showFeedback(correct, q);
  document.getElementById('nextBtn').style.display = 'inline-block';
}

// ══════════════════════════════════════════════
// FEEDBACK / NAV
// ══════════════════════════════════════════════
function showFeedback(correct, q) {
  const fb = document.getElementById('feedbackBox');
  fb.className = `feedback-box ${correct ? 'correct':'wrong'}`;
  fb.innerHTML = `
    <div class="fb-title">${correct ? '✅ 정확해요!' : '❌ 다시 보기'}</div>
    <div>${correct ? q.feedback.correct : q.feedback.wrong}</div>
    <div class="fb-source">출처: ${currentChapter.source} · ${currentChapter.topic} 토픽</div>`;
  fb.style.display = 'block';
}

function prevQuestion() {
  const floor = currentChapter.concept ? -1 : 0;
  if (currentQIdx <= floor) return;
  currentQIdx--;
  renderQuestion();
}
function nextQuestion() { currentQIdx++; renderQuestion(); }

function showScore() {
  document.getElementById('quizArea').classList.remove('visible');
  const ss = document.getElementById('scoreScreen');
  ss.classList.add('visible');
  const total = currentChapter.questions.length;
  const pct = Math.round((score/total)*100);
  document.getElementById('scoreEmoji').textContent = pct>=80?'🎉':pct>=60?'💪':'📖';
  document.getElementById('scoreNum').textContent = `${score} / ${total}`;
  document.getElementById('scoreSub').textContent = pct>=80?'완벽해요! 이제 수업에서 바로 말해볼 준비가 됐어요.':pct>=60?'절반 이상 맞혔어요. 틀린 문제를 복습해보세요!':'개념을 한 번 더 확인하고 다시 도전해보세요!';
  const correct = answers.filter(a=>a && a.correct).length;
  const wrong = answers.filter(a=>a && !a.correct).length;
  document.getElementById('scoreBreakdown').innerHTML = `
    <div class="sb-row"><span>챕터</span><span>${currentChapter.num}. ${currentChapter.name}</span></div>
    <div class="sb-row"><span>주제</span><span>${currentChapter.topic}</span></div>
    <div class="sb-row"><span>정답</span><span class="sb-val good">${correct}개</span></div>
    <div class="sb-row"><span>오답</span><span class="sb-val bad">${wrong}개</span></div>
    <div class="sb-row"><span>정답률</span><span>${pct}%</span></div>`;
  updateProgress(true);
}

function updateProgress(done=false) {
  const total = currentChapter ? currentChapter.questions.length : 0;
  const pct = done ? 100 : (total ? Math.round((Math.max(0,currentQIdx)/total)*100) : 0);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = done ? `${total} / ${total}` : `${Math.max(0,currentQIdx)} / ${total}`;
}

renderSelector();
</script>
</body>
</html>
